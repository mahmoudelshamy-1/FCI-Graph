<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>FCI Knowledge Graph</title>

    <!-- Graphviz + D3 (نفس مكتبات JustinMath بالظبط) -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/viz.js@1.8.0/viz.js" type="javascript/worker"></script>
    <script src="https://unpkg.com/d3-graphviz@2.6.1/build/d3-graphviz.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            display: flex;
            background: #ffffff;
        }

        /* ===== السايدبار (يسار، زي JustinMath بالظبط) ===== */
        #infoPanel {
            width: 40%;
            max-width: 480px;
            height: 100%;
            background: #f4f4f4;
            border-left: 1px solid #999;
            overflow-y: auto;
            padding: 18px 22px;
            flex-shrink: 0;
            direction: rtl;
            text-align: right;
            -webkit-overflow-scrolling: touch;
            transition: transform 0.3s ease;
        }
        #infoPanel-title {
            font-size: 130%;
            font-weight: bold;
            text-align: center;
            padding: 10px 0 12px;
            border-bottom: 2px solid #555;
        }
        #infoPanel-cat {
            text-align: center;
            font-size: 85%;
            color: #666;
            margin-top: -6px;
            margin-bottom: 10px;
        }
        #infoPanel-desc {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px 14px;
            margin: 12px 0;
            font-size: 95%;
            line-height: 1.9;
            color: #333;
        }
        .info-section {
            margin-top: 16px;
        }
        .info-section-title {
            font-size: 100%;
            font-weight: bold;
            border-bottom: 1px solid #aaa;
            padding-bottom: 5px;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        .pill {
            display: inline-block;
            background: #e8e8e8;
            border: 1px solid #ccc;
            color: #333;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 85%;
            margin: 0 0 5px 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .pill:hover { background: #d4d4d4; border-color: #888; }
        .content-item {
            display: flex;
            gap: 10px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 9px 11px;
            margin-bottom: 6px;
        }
        .content-num {
            background: #eaeaea;
            color: #444;
            min-width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 85%;
            font-weight: bold;
            flex-shrink: 0;
        }
        .content-empty {
            color: #999;
            font-style: italic;
            padding: 10px;
            background: #fafafa;
            border: 1px dashed #ccc;
            border-radius: 6px;
            font-size: 90%;
        }

        /* ===== الجراف (يمين) ===== */
        #graph {
            flex: 1;
            height: 100%;
            position: relative;
            background: #ffffff;
        }
        #graph svg {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: block;
        }
        #graph svg:active { cursor: grabbing; }

        /* ===== العنوان العلوي ===== */
        #topbar {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0));
            z-index: 10;
        }
        #topbar > * { pointer-events: auto; }
        #title {
            font-size: 16px;
            font-weight: bold;
            color: #222;
            text-shadow: 0 1px 3px rgba(255,255,255,0.8);
            white-space: nowrap;
        }
        #reset-btn, #legend-toggle {
            padding: 7px 12px;
            background: rgba(255,255,255,0.9);
            border: 1px solid #ccc;
            border-radius: 7px;
            font-size: 85%;
            cursor: pointer;
            color: #444;
            transition: 0.2s;
        }
        #reset-btn:hover, #legend-toggle:hover { border-color: #888; background: #f0f0f0; }

        /* ===== الـ legend ===== */
        #legend {
            position: absolute;
            bottom: 14px;
            right: 14px;
            background: rgba(255,255,255,0.95);
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 85%;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #legend h4 { font-size: 90%; margin-bottom: 6px; color: #555; }
        .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }

        /* ===== زر الموبايل ===== */
        #menu-toggle { display: none; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #infoPanel {
                width: 100%;
                max-width: none;
                height: 45%;
                border-left: none;
                border-top: 1px solid #999;
                order: 2;
            }
            #graph { height: 55%; order: 1; }
            #title { font-size: 13px; max-width: 50vw; overflow: hidden; text-overflow: ellipsis; }
            #menu-toggle { display: block; }
        }
    </style>
</head>
<body>
    <!-- السايدبار: محتوى المادة -->
    <div id="infoPanel">
        <div id="infoPanel-title">خريطة المواد</div>
        <div id="infoPanel-body">
            <div style="text-align:center; color:#888; margin-top:40px; font-size:95%;">
                👆 اضغط على أي مادة لعرض تفاصيلها
            </div>
        </div>
    </div>

    <!-- الجراف -->
    <div id="graph">
        <div id="topbar">
            <div id="title">خريطة مواد كلية الحاسبات ومعلومات</div>
            <button id="reset-btn" onclick="resetView()">↺ عرض</button>
            <button id="legend-toggle" onclick="toggleLegend()">📊 الأقسام</button>
        </div>

        <div id="legend">
            <h4>الأقسام</h4>
            <div id="legend-items"></div>
        </div>
    </div>

    <script src="graph.js"></script>
</body>
</html>
